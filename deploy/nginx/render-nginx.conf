events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Update hostnames below to your actual Render backend service domains.
    upstream fms_backend_pool {
        least_conn;
        server fms-backend-a.onrender.com:443;
        server fms-backend-b.onrender.com:443;
        # server fms-backend-c.onrender.com:443;
        keepalive 32;
    }

    server {
        # Render maps external traffic to the container port.
        # 10000 is a commonly used port in Render Docker services.
        listen 10000;
        server_name _;

        location / {
            proxy_pass https://fms_backend_pool;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_ssl_server_name on;

            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }
    }
}
